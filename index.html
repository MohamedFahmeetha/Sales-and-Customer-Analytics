<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Dashboard App</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#f4f6f9; }
    .container { display:flex; height:100vh; }
    .sidebar { width:220px; background:#1e293b; color:white; padding:20px; }
    .sidebar h2 { margin-bottom:20px; }
    .sidebar a { display:block; color:#cbd5f5; text-decoration:none; margin:10px 0; }
    .sidebar a:hover { color:white; }
    .main { flex:1; padding:20px; }
    .header { display:flex; justify-content:space-between; align-items:center; }
    .card { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); margin-top:20px; }
    iframe { width:100%; height:400px; border:none; }

    /* Login Page */
    .login-container { display:flex; justify-content:center; align-items:center; height:100vh; }
    .login-box { background:white; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.2); width:300px; }
    .login-box h2 { text-align:center; }
    .login-box input { width:100%; padding:10px; margin:10px 0; }
    .login-box button { width:100%; padding:10px; background:#2563eb; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
  <div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" style="display:none;">
  <div class="container">
    <div class="sidebar">
      <h2>My App</h2>
      <a href="#">Dashboard</a>
      <a href="#">Reports</a>
      <a href="#">Settings</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main">
      <div class="header">
        <h1>Dashboard</h1>
        <span id="userDisplay"></span>
      </div>

      <div class="card">
        <h3>IBM Cognos Report</h3>
        <iframe src="https://ap2.ca.analytics.ibm.com/bi/?perspective=dashboard&pathRef=.my_folders%2Fsufah%2Breport&closeWindowOnLastView=true&ui_appbar=false&ui_navbar=false&shareMode=embedded&action=view&mode=dashboard&subView=model0000019d6cfcf2cf_00000001&nav_filter=true"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if(username === 'admin' && password === '1234') {
      localStorage.setItem('user', username);
      showDashboard();
    } else {
      alert('Invalid credentials');
    }
  }

  function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';
    document.getElementById('userDisplay').innerText = "Welcome, " + localStorage.getItem('user');
  }

  function logout() {
    localStorage.removeItem('user');
    location.reload();
}

  window.onload = function() {
    if(localStorage.getItem('user')) {
      showDashboard();
    }
  }
</script>

</body>
</html>
